<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MikroTik PPPoE Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
        
        // Strict Auth Check before body loads
        if (!localStorage.getItem('dashboard_token')) {
            window.location.href = '/login.html';
        }
    </script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-300 hidden" id="app-body">
    <!-- Navbar -->
    <nav class="bg-blue-600 text-white shadow-lg relative z-10">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-network-wired text-2xl"></i>
                    <span class="font-bold text-xl tracking-tight">MikroTik Monitor</span>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="theme-toggle" class="p-2 rounded-full hover:bg-blue-700 transition">
                        <i class="fas fa-moon" id="theme-icon"></i>
                    </button>
                    <button id="refresh-btn" class="p-2 rounded-full hover:bg-blue-700 transition flex items-center space-x-1">
                        <i class="fas fa-sync-alt"></i> <span class="hidden sm:inline">Refresh</span>
                    </button>
                    <div class="border-l border-blue-400 h-6 mx-2 hidden sm:block"></div>
                    
                    <!-- Router Selector -->
                    <select id="router-select" class="bg-blue-800/50 text-white rounded-lg px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm hidden sm:block">
                        <option value="all">All Routers</option>
                    </select>

                    <button id="add-router-btn" class="p-2 rounded hover:bg-blue-700 transition flex items-center space-x-1 text-sm font-medium hidden sm:flex" data-tooltip="Add Mikrotik">
                        <i class="fas fa-plus"></i> <span class="hidden md:inline">Add Router</span>
                    </button>

                    <button id="edit-router-btn" class="p-2 rounded text-blue-100 hover:bg-blue-700 transition items-center space-x-1 text-sm font-medium hidden sm:flex hidden" data-tooltip="Edit Router">
                        <i class="fas fa-edit"></i>
                    </button>

                    <button id="delete-router-btn" class="p-2 rounded text-red-100 hover:bg-red-600 transition items-center space-x-1 text-sm font-medium hidden sm:flex hidden" data-tooltip="Delete Router">
                        <i class="fas fa-trash-alt"></i>
                    </button>

                    <div class="border-l border-blue-400 h-6 mx-2 hidden sm:block"></div>
                    <!-- Router Status -->
                    <div id="router-status-indicator" class="flex items-center space-x-2 bg-blue-800/30 px-3 py-1.5 rounded-full border border-blue-400/30 transition-all duration-300">
                        <div class="relative flex h-3 w-3">
                          <span id="router-ping-ring" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-gray-400 opacity-75"></span>
                          <span id="router-ping-dot" class="relative inline-flex rounded-full h-3 w-3 bg-gray-500"></span>
                        </div>
                        <span id="router-text" class="text-xs font-medium tracking-wide">Connecting...</span>
                    </div>
                    <div class="border-l border-blue-400 h-6 mx-2"></div>
                    <button id="logout-btn" class="p-2 rounded hover:bg-blue-700 transition flex items-center space-x-1 text-sm font-medium">
                        <i class="fas fa-sign-out-alt"></i> <span class="hidden sm:inline">Logout</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-8 space-y-8">
        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-blue-500 stat-card">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-500 uppercase tracking-wider">Total Users</p>
                        <p class="mt-2 text-3xl font-bold" id="total-users">-</p>
                    </div>
                    <div class="p-3 bg-blue-100 rounded-full text-blue-600">
                        <i class="fas fa-users text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-green-500 stat-card">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-500 uppercase tracking-wider">Active Users</p>
                        <p class="mt-2 text-3xl font-bold text-green-600" id="active-users">-</p>
                    </div>
                    <div class="p-3 bg-green-100 rounded-full text-green-600">
                        <i class="fas fa-user-check text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-red-500 stat-card">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-500 uppercase tracking-wider">Down Users</p>
                        <p class="mt-2 text-3xl font-bold text-red-600" id="down-users">-</p>
                    </div>
                    <div class="p-3 bg-red-100 rounded-full text-red-600">
                        <i class="fas fa-user-times text-xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts and Map Row -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Active Users Chart -->
            <div class="bg-white rounded-xl shadow-md p-6 chart-container">
                <h3 class="text-lg font-bold mb-4 flex items-center space-x-2">
                    <i class="fas fa-chart-line text-blue-500"></i>
                    <span>Active Users Over Time</span>
                </h3>
                <div class="relative h-64">
                    <canvas id="activeUsersChart"></canvas>
                </div>
            </div>
            <!-- Traffic Monitor -->
            <div class="bg-white rounded-xl shadow-md p-6 flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold flex items-center space-x-2">
                        <i class="fas fa-network-wired text-green-500"></i>
                        <span>Traffic Monitoring (Tx/Rx)</span>
                    </h3>
                    <select id="traffic-interface" class="border border-gray-300 rounded px-2 py-1 text-sm bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 max-w-[150px] truncate hidden">
                        <option value="all">All Interfaces</option>
                    </select>
                </div>
                <div class="relative w-full flex-grow" style="min-height: 250px;">
                    <canvas id="trafficChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Connection Logs -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden log-container">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 class="text-lg font-bold flex items-center space-x-2">
                    <i class="fas fa-history text-purple-500"></i>
                    <span>Recent Disconnects & Logs</span>
                </h3>
            </div>
            <div class="max-h-48 overflow-y-auto w-full">
                <ul id="log-list" class="divide-y divide-gray-100 text-sm">
                    <!-- Logs populated here -->
                    <li class="px-6 py-3 text-gray-500 text-center">Loading logs...</li>
                </ul>
            </div>
        </div>

        <!-- Users Table -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden table-container">
            <div class="px-6 py-4 border-b border-gray-100 flex flex-col sm:flex-row justify-between items-start sm:items-center space-y-4 sm:space-y-0 bg-gray-50">
                <h3 class="text-lg font-bold flex items-center space-x-2">
                    <i class="fas fa-list text-blue-500"></i>
                    <span>PPPoE Users</span>
                </h3>
                <div class="flex items-center space-x-3 w-full sm:w-auto">
                    <div class="relative w-full sm:w-64">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-search text-gray-400"></i>
                        </div>
                        <input type="text" id="search-input" class="pl-10 pr-4 py-2 w-full border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block text-sm outline-none transition" placeholder="Search username...">
                    </div>
                     <button id="export-btn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition flex items-center space-x-2">
                        <i class="fas fa-file-csv"></i> <span class="hidden sm:inline">Export</span>
                    </button>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Username</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">IP Address</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Service</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Uptime</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body" class="bg-white divide-y divide-gray-200">
                        <!-- Table rows populated here -->
                        <tr><td colspan="5" class="px-6 py-4 text-center text-gray-500">Loading data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Add Router Modal -->
    <div id="add-router-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl p-6 w-full max-w-md mx-4 transform transition-all">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold dark:text-white">Add MikroTik Router</h3>
                <button id="close-router-modal" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="add-router-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-gray-300">Router Name</label>
                    <input type="text" id="router-name" required class="w-full px-3 py-2 rounded-lg border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-blue-500" placeholder="e.g. Area 1 Mikrotik">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-gray-300">IP Host / Address</label>
                    <input type="text" id="router-host" required class="w-full px-3 py-2 rounded-lg border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-blue-500" placeholder="e.g. 10.7.0.6">
                </div>
                <div class="border-t dark:border-gray-600 pt-4 mt-4">
                    <h4 class="text-sm font-bold mb-3 dark:text-white">Connection Protocols</h4>
                    <div class="space-y-4">
                        <!-- API -->
                        <div class="flex flex-col space-y-2 border-l-4 border-blue-500 pl-3">
                            <div class="flex items-center justify-between">
                                <label class="flex items-center space-x-2 text-sm font-bold dark:text-gray-300 cursor-pointer">
                                    <input type="checkbox" id="use-api" checked class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                                    <span>Use RouterOS API</span>
                                </label>
                                <input type="number" id="api-port" value="8728" class="w-24 px-2 py-1 text-sm rounded-lg border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-blue-500 placeholder-gray-400" placeholder="Port">
                            </div>
                            <div id="api-settings" class="grid grid-cols-2 gap-2 mt-2">
                                <input type="text" id="router-user" class="w-full px-3 py-2 text-sm rounded-lg border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-blue-500" placeholder="API Username">
                                <input type="password" id="router-pass" class="w-full px-3 py-2 text-sm rounded-lg border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-blue-500" placeholder="API Password">
                            </div>
                        </div>
                        <!-- SSH -->
                        <div class="flex flex-col space-y-2 border-l-4 border-green-500 pl-3">
                            <div class="flex items-center justify-between">
                                <label class="flex items-center space-x-2 text-sm font-bold dark:text-gray-300 cursor-pointer">
                                    <input type="checkbox" id="use-ssh" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                                    <span>Use SSH</span>
                                </label>
                                <input type="number" id="ssh-port" value="22" class="w-24 px-2 py-1 text-sm rounded-lg border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-blue-500 placeholder-gray-400" placeholder="Port">
                            </div>
                            <div id="ssh-settings" class="grid grid-cols-2 gap-2 mt-2 hidden">
                                <input type="text" id="ssh-user" class="w-full px-3 py-2 text-sm rounded-lg border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-blue-500" placeholder="SSH Username">
                                <input type="password" id="ssh-pass" class="w-full px-3 py-2 text-sm rounded-lg border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-blue-500" placeholder="SSH Password">
                            </div>
                        </div>
                        <!-- SNMP -->
                        <div class="flex flex-col space-y-2 border-l-4 border-purple-500 pl-3">
                            <div class="flex items-center justify-between xl:flex-row flex-col xl:space-y-0 space-y-2">
                                <label class="flex items-center space-x-2 text-sm font-bold dark:text-gray-300 cursor-pointer">
                                    <input type="checkbox" id="use-snmp" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                                    <span>Use SNMP (Stats & Traffic)</span>
                                </label>
                                <div class="flex space-x-2">
                                    <input type="text" id="snmp-host" class="w-32 px-2 py-1 text-sm rounded-lg border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-blue-500 placeholder-gray-400" placeholder="Host (Opt)">
                                    <input type="number" id="snmp-port" value="161" class="w-20 px-2 py-1 text-sm rounded-lg border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-blue-500 placeholder-gray-400" placeholder="Port">
                                </div>
                            </div>
                            
                            <div id="snmp-settings" class="bg-gray-50 dark:bg-gray-700/50 p-3 rounded-lg space-y-3 mt-2 hidden">
                                <div class="flex space-x-2">
                                    <select id="snmp-version" class="w-1/3 px-2 py-1 text-sm rounded-lg border dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                                        <option value="v1">v1</option>
                                        <option value="v2c" selected>v2c</option>
                                        <option value="v3">v3</option>
                                    </select>
                                    <input type="text" id="snmp-community" value="public" class="w-2/3 px-2 py-1 text-sm rounded-lg border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-blue-500 placeholder-gray-400" placeholder="Community String">
                                </div>
                                
                                <div>
                                    <input type="text" id="snmp-interface" value="all" class="w-full px-2 py-1 text-sm rounded-lg border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-blue-500 placeholder-gray-400" placeholder="Interface filter (e.g. ether1 or all)">
                                </div>
                                
                                <div id="snmp-v3-settings" class="space-y-2 hidden">
                                    <input type="text" id="snmp-username" class="w-full px-2 py-1 text-sm rounded-lg border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-blue-500 placeholder-gray-400" placeholder="SNMPv3 Username">
                                    <div class="grid grid-cols-2 gap-2">
                                        <select id="snmp-auth-protocol" class="w-full px-2 py-1 text-sm rounded-lg border dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                                            <option value="MD5">MD5</option>
                                            <option value="SHA" selected>SHA</option>
                                        </select>
                                        <input type="password" id="snmp-auth-password" class="w-full px-2 py-1 text-sm rounded-lg border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-blue-500 placeholder-gray-400" placeholder="Auth Password">
                                    </div>
                                    <div class="grid grid-cols-2 gap-2">
                                        <select id="snmp-priv-protocol" class="w-full px-2 py-1 text-sm rounded-lg border dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                                            <option value="DES">DES</option>
                                            <option value="AES" selected>AES</option>
                                        </select>
                                        <input type="password" id="snmp-priv-password" class="w-full px-2 py-1 text-sm rounded-lg border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-blue-500 placeholder-gray-400" placeholder="Priv Password">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div id="router-error" class="hidden text-red-500 text-sm mb-2"></div>
                
                <div class="flex justify-end space-x-3 mt-6">
                    <button type="button" id="cancel-router-btn" class="px-4 py-2 border rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700">Cancel</button>
                    <button type="submit" id="save-router-btn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex items-center">
                        <span>Save Router</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/app.js?v=3"></script>
</body>
</html>
